<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线性表应用探究 · AI学习助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f7f3ed;
    --accent: #c84b31;
    --accent2: #2d6a4f;
    --gold: #e8a838;
    --muted: #8a8070;
    --border: #d4cdc4;
    --ai-bubble: #f0ece6;
    --shadow: 0 2px 16px rgba(26,26,46,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 32px 22px;
    position: relative;
    z-index: 1;
  }
  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.9;
  }
  header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }
  header h1 span { color: var(--gold); }
  .header-sub {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
  }
  .progress-bar-wrap {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
  }
  .progress-track {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    border-radius: 2px;
    transition: width 0.6s ease;
    width: 0%;
  }
  .round-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    white-space: nowrap;
  }

  /* ── Main ── */
  main {
    flex: 1;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 0 32px 32px;
    display: flex;
    flex-direction: column;
  }

  .info-card {
    background: white;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 14px 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .info-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .info-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
  .info-dot.gold { background: var(--gold); }
  .info-dot.red  { background: var(--accent); }

  /* ── Chat ── */
  .chat-wrap {
    margin-top: 24px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }
  .chat-messages {
    padding: 28px 28px 16px;
    min-height: 360px;
    max-height: 520px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Bubbles */
  .msg { display: flex; gap: 12px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; margin-top: 2px;
  }
  .msg.ai   .msg-avatar { background: var(--ink); color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.5px; }
  .msg.user .msg-avatar { background: var(--accent); color: white; font-size: 13px; }

  .msg-body { flex: 1; max-width: 78%; }
  .msg.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

  .msg-name { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }

  .msg-bubble {
    padding: 12px 16px; border-radius: 14px;
    font-size: 14.5px; line-height: 1.75; color: var(--ink); max-width: 100%;
  }
  .msg.ai   .msg-bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
  .msg.user .msg-bubble { background: var(--ink); color: #fff; border-radius: 14px 4px 14px 14px; }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { font-weight: 600; }
  .msg-bubble em { font-style: italic; color: var(--accent2); }

  /* Thinking */
  .thinking { display: flex; gap: 12px; align-items: flex-start; }
  .thinking-dots {
    display: flex; gap: 5px; padding: 14px 18px;
    background: var(--ai-bubble); border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
  }
  .thinking-dots span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{ transform: translateY(0); opacity: 0.4; } 30%{ transform: translateY(-6px); opacity: 1; } }

  /* Summary */
  .summary-card {
    margin: 4px 0;
    background: linear-gradient(135deg, #f8f4ee 0%, #fff9f2 100%);
    border: 1px solid var(--gold); border-left: 4px solid var(--gold);
    border-radius: 4px 12px 12px 12px;
    padding: 16px 18px; font-size: 14px; line-height: 1.8;
  }
  .summary-title {
    font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 15px;
    color: var(--ink); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .summary-title::before { content: '◆'; color: var(--gold); font-size: 10px; }
  .app-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .app-item {
    display: flex; gap: 10px; padding: 10px 12px;
    background: white; border-radius: 8px; border: 1px solid var(--border);
  }
  .app-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 2px 7px; border-radius: 4px;
    background: var(--ink); color: var(--gold);
    white-space: nowrap; align-self: flex-start; margin-top: 1px; letter-spacing: 0.5px;
  }
  .app-desc { font-size: 13.5px; line-height: 1.6; color: var(--ink); }
  .app-desc strong { color: var(--accent); }
  .future-note {
    margin-top: 6px; font-size: 12px; color: #2d6a4f;
    background: rgba(45,106,79,0.08); border: 1px solid rgba(45,106,79,0.2);
    border-radius: 6px; padding: 4px 9px; display: inline-block; line-height: 1.5;
  }

  /* Input */
  .hint-area { padding: 10px 20px 0; display: flex; gap: 8px; flex-wrap: wrap; background: #fafafa; }
  .hint-chip {
    font-size: 12px; padding: 5px 12px;
    border: 1px solid var(--border); border-radius: 20px;
    background: white; color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .hint-chip:hover { border-color: var(--ink); color: var(--ink); background: var(--ai-bubble); }

  .chat-input-area {
    border-top: 1px solid var(--border); padding: 16px 20px;
    background: #fafafa; display: flex; gap: 10px; align-items: flex-end;
  }
  .input-wrap { flex: 1; }
  textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 11px 14px; font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px; color: var(--ink); background: white;
    resize: none; outline: none; line-height: 1.6;
    min-height: 48px; max-height: 120px; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--ink); }
  textarea::placeholder { color: var(--muted); }
  textarea:disabled { background: #f0ece6; cursor: not-allowed; }

  .send-btn {
    width: 46px; height: 46px; border-radius: 10px; background: var(--ink);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: #2d2d4e; }
  .send-btn:active:not(:disabled) { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .send-btn:disabled svg { fill: var(--muted); }

  .restart-btn {
    margin-top: 20px; display: none; align-self: center;
    padding: 10px 28px; background: white;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 13px;
    color: var(--ink); cursor: pointer; transition: all 0.2s;
  }
  .restart-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }


  /* ── Settings Button ── */
  .settings-btn {
    flex-shrink: 0;
    margin-top: 2px;
    padding: 7px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,20,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    width: 500px;
    max-width: 94vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }
  .modal-header {
    background: var(--ink);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .modal-close {
    background: none; border: none;
    color: rgba(255,255,255,0.5); cursor: pointer;
    font-size: 20px; line-height: 1; padding: 0 2px; transition: color 0.15s;
  }
  .modal-close:hover { color: white; }
  .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .field-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .model-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .model-card:hover { border-color: #888; }
  .model-card.selected { border-color: var(--ink); background: #f4f2ff; }
  .model-card.selected::after {
    content: '✓';
    position: absolute; top: 8px; right: 10px;
    font-size: 11px; color: var(--accent2); font-weight: 700;
  }
  .model-provider {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 0.5px; margin-bottom: 3px;
  }
  .model-name { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.3; }
  .model-badge {
    display: inline-block; margin-top: 5px; font-size: 10px;
    padding: 1px 6px; border-radius: 4px;
    background: rgba(232,168,56,0.15); color: #9a6b0d;
    font-family: 'JetBrains Mono', monospace;
  }
  .model-badge.cn { background: rgba(45,106,79,0.1); color: var(--accent2); }
  .key-input-wrap { position: relative; }
  .key-input {
    width: 100%;
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 10px 40px 10px 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--ink);
    outline: none; transition: border-color 0.2s; background: #fafafa;
  }
  .key-input:focus { border-color: var(--ink); background: white; }
  .key-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px;
  }
  .key-hint { margin-top: 6px; font-size: 11.5px; color: var(--muted); line-height: 1.5; }
  .key-hint a { color: var(--accent2); text-decoration: none; }
  .key-hint a:hover { text-decoration: underline; }
  .modal-save {
    width: 100%; padding: 12px; background: var(--ink); color: white;
    border: none; border-radius: 8px; font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px; cursor: pointer; transition: background 0.2s;
  }
  .modal-save:hover { background: #2d2d4e; }
  .active-model-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: rgba(255,255,255,0.4); margin-top: 6px;
  }
  .active-model-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent2);
  }
  .no-key-banner {
    display: none;
    background: rgba(200,75,49,0.12); border: 1px solid rgba(200,75,49,0.3);
    border-radius: 8px; padding: 10px 16px; margin-top: 16px;
    font-size: 13px; color: var(--accent);
    text-align: center; cursor: pointer;
  }
  .no-key-banner:hover { background: rgba(200,75,49,0.18); }

  @media (max-width: 600px) {
    main { padding: 0 16px 24px; }
    .header-inner { padding: 20px 16px 16px; }
    .chat-messages { padding: 20px 16px 12px; max-height: 420px; }
    header h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
      <div>
        <div class="header-tag">数据结构 · 探究学习</div>
        <h1>线性表<span>在软件设计中的应用</span></h1>
        <div class="header-sub">与 AI 助手对话，探索线性表背后的工程思维</div>
        <div class="active-model-badge">
          <div class="active-model-dot"></div>
          <span id="activeModelLabel">未配置模型</span>
        </div>
      </div>
      <button class="settings-btn" onclick="openSettings()">
        ⚙ 模型设置
      </button>
    </div>
    <div class="progress-bar-wrap">
      <span class="progress-label">探究进度</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="round-counter" id="roundCounter">0 / 10 轮</span>
    </div>
  </div>
</header>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">模型设置</span>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="field-label">选择模型</div>
        <div class="model-grid" id="modelGrid"></div>
      </div>
      <div>
        <div class="field-label">API Key</div>
        <div class="key-input-wrap">
          <input class="key-input" type="password" id="apiKeyInput" placeholder="粘贴你的 API Key…" />
          <button class="key-toggle" onclick="toggleKeyVisibility()">👁</button>
        </div>
        <div class="key-hint" id="keyHint">请先选择模型</div>
      </div>
      <button class="modal-save" onclick="saveSettings()">保存并开始</button>
    </div>
  </div>
</div>

<main>
  <div class="info-card">
    <div class="info-item"><div class="info-dot"></div>最多 10 轮对话</div>
    <div class="info-item"><div class="info-dot gold"></div>AI 以启发为主，不直接给答案</div>
    <div class="info-item"><div class="info-dot red"></div>AI 动态判断，充分后自动总结</div>
  </div>

  <div class="no-key-banner" id="noKeyBanner" onclick="openSettings()">
    ⚠️ 请先点击右上角「模型设置」配置 API Key 后开始使用
  </div>

  <div class="chat-wrap">
    <div class="hint-area" id="hintArea">
      <span class="hint-chip" onclick="useHint(this)">线性表能存什么？</span>
      <span class="hint-chip" onclick="useHint(this)">顺序表和链表有什么区别？</span>
      <span class="hint-chip" onclick="useHint(this)">日常软件哪里用到了线性结构？</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="输入你的想法或问题……" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <button class="restart-btn" id="restartBtn" onclick="restart()">↺ 重新开始探究</button>
</main>

<script>
// ══════════════════════════════════════════════════════
//  PROMPTS
// ══════════════════════════════════════════════════════
const SYSTEM_PROMPT = `你是一位数据结构课程的学习引导助手。你的任务是通过对话，帮助学生将"线性表"的理论知识与实际软件设计联系起来。

【你的角色定位】
- 你是引导者，不是讲解者
- 用苏格拉底式提问激发学生思考
- 不直接给出答案，而是引导学生自己发现

【学生的知识基础】
学生刚学完线性表，掌握以下内容：
- 线性表的逻辑结构（一对一的线性关系）
- 顺序存储结构（顺序表）：随机访问O(1)，插入删除O(n)
- 链式存储结构（单链表、双链表等）：插入删除O(1)，访问O(n)
- 基本操作：初始化、插入、删除、查找、遍历

【对话规则】
1. 对话最多进行10轮（用户发一条算一轮），当前是第{ROUND}轮
2. 每轮对话必须以启发性问题结尾，引导学生进一步思考
3. 对学生的想法给予肯定，再引导深入
4. 讨论应围绕线性表在实际软件中的应用场景

【何时结束对话 —— 动态判断规则】
你需要在每轮回复后自主判断讨论是否已经充分，决定是否触发总结。

可以提前结束（最早第3轮后）的条件——满足以下全部：
  ① 学生已主动提出或认可了至少3个不同的应用场景
  ② 学生的回答体现了对"为什么用线性表"的理解（说出了顺序、插删等特性，而不只是举例）
  ③ 本轮学生回答质量高、思路清晰，继续追问收益不大

必须继续的情况：
  - 学生回答过于简单，尚未深入
  - 学生只涉及了1-2个场景，还有明显可探索的方向
  - 学生对线性表特性的理解还不清晰

强制结束：第10轮无论如何必须触发总结。

【触发总结的方式】
当你判断本轮应结束时，在回复正文末尾追加标记 [SUMMARY_TRIGGER]（正文中不要提及这个标记的存在）。
正文可自然收尾，如"我们今天探讨得很充分了"，无需刻意说明"对话结束"。

【引导方向参考】（不要直接说出，要让学生自己说出来）
- 浏览器历史记录（双链表/顺序表）
- 撤销/重做功能（栈，基于线性表）
- 音乐播放列表（链表）
- 消息队列（队列，基于线性表）
- 文本编辑（链表结构）
- 购物车（顺序表）
- 图片轮播（循环链表）

【对话风格】
- 语言简洁、亲切，适合大学生
- 中文对话
- 每次回复不超过150字（总结除外）
- 多用"你觉得……""假设……""如果……"开头的问句`;

const SUMMARY_SYSTEM = '你是数据结构教学助手，请按要求生成总结，只返回JSON，不要有任何markdown标记或额外文字。';

const SUMMARY_PROMPT = `根据刚才与学生的完整对话，完成以下任务：

1. 用2-3句话简要总结学生在对话中展现的思考亮点（肯定学生）
2. 给出6-8个线性表在实际软件设计中的典型应用场景

【重要说明】
学生目前只学过"线性表"（包括顺序表、链表），尚未学习栈、队列、哈希表、树、图等数据结构。
- 如果某个应用场景用到了栈、队列等"基于线性表扩展的结构"，请在 future_note 字段注明："栈/队列是基于线性表实现的特殊结构，将在后续章节学习"
- 如果某个应用场景用到了哈希表、树、图等与线性表无直接关联的结构，future_note 注明："哈希表/树/图将在后续章节单独学习"
- 如果仅用到顺序表或链表，future_note 为空字符串 ""

请严格按以下JSON格式返回，不要有任何其他文字：
{
  "highlights": "学生思考亮点的总结文字",
  "applications": [
    {"tag":"场景标签(4字以内)","name":"应用名称","structure":"使用的线性表结构","reason":"为什么适合用线性表，以及用了什么特性（30字以内）","future_note":"后续学习提示，无则为空字符串"},
    ...
  ]
}`;

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let history = [], round = 0, isFinished = false, isSending = false;
let apiKey = '', selectedModelId = '';
const MAX_ROUNDS = 10;

function getModel() { return MODELS.find(m => m.id === selectedModelId); }

function persistSettings() {
  sessionStorage.setItem('ds_model', selectedModelId);
  sessionStorage.setItem('ds_key', apiKey);
}
function loadSettings() {
  selectedModelId = sessionStorage.getItem('ds_model') || '';
  apiKey = sessionStorage.getItem('ds_key') || '';
}

// ══════════════════════════════════════════════════════
//  SETTINGS MODAL
// ══════════════════════════════════════════════════════
function renderModelGrid() {
  const grid = document.getElementById('modelGrid');
  grid.innerHTML = MODELS.map(m => `
    <div class="model-card ${selectedModelId === m.id ? 'selected' : ''}"
         onclick="selectModel('${m.id}')">
      <div class="model-provider">${m.provider}</div>
      <div class="model-name">${m.name}</div>
      <span class="model-badge ${m.badgeClass}">${m.badge}</span>
    </div>`).join('');
}

function selectModel(id) {
  selectedModelId = id;
  renderModelGrid();
  const m = getModel();
  if (m) document.getElementById('keyHint').innerHTML = m.keyHint;
}

function openSettings() {
  renderModelGrid();
  document.getElementById('apiKeyInput').value = apiKey;
  if (selectedModelId) {
    const m = getModel();
    if (m) document.getElementById('keyHint').innerHTML = m.keyHint;
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeSettings() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeOnOverlay(e) { if (e.target === document.getElementById('modalOverlay')) closeSettings(); }
function toggleKeyVisibility() {
  const inp = document.getElementById('apiKeyInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!selectedModelId) { alert('请先选择一个模型'); return; }
  if (!key) { alert('请填入 API Key'); return; }
  apiKey = key;
  persistSettings();
  closeSettings();
  updateModelLabel();
  document.getElementById('noKeyBanner').style.display = 'none';
  enableChat();
}
function updateModelLabel() {
  const m = getModel();
  document.getElementById('activeModelLabel').textContent =
    m ? `${m.provider} · ${m.name}` : '未配置模型';
}
function enableChat() {
  document.getElementById('userInput').disabled = false;
  document.getElementById('userInput').placeholder = '输入你的想法或问题……';
  document.getElementById('sendBtn').disabled = false;
}

// ══════════════════════════════════════════════════════
//  API CALL
// ══════════════════════════════════════════════════════
async function callAI(system, messages, maxTokens = 1000) {
  const model = getModel();
  if (!model) throw new Error('未选择模型');
  if (!apiKey) throw new Error('未填写 API Key');
  const req = model.buildRequest(apiKey, system, messages, maxTokens);
  const res = await fetch(req.url, {
    method: 'POST',
    headers: req.headers,
    body: JSON.stringify(req.body)
  });
  const data = await res.json();
  return model.parseResponse(data);
}

// ══════════════════════════════════════════════════════
//  CHAT
// ══════════════════════════════════════════════════════
async function sendMessage() {
  if (isSending || isFinished || !apiKey || !selectedModelId) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  isSending = true;
  round++;
  updateProgress();
  input.value = ''; autoResize(input);
  document.getElementById('hintArea').style.display = 'none';

  appendUserMessage(text);
  history.push({ role: 'user', content: text });
  setInputEnabled(false);
  const thinking = showThinking();

  try {
    let aiText = await callAI(SYSTEM_PROMPT.replace('{ROUND}', round), history);
    removeThinking(thinking);

    const isTrigger = aiText.includes('[SUMMARY_TRIGGER]');
    aiText = aiText.replace('[SUMMARY_TRIGGER]', '').trim();
    history.push({ role: 'assistant', content: aiText });
    appendAIMessage(aiText);

    if (isTrigger || round >= MAX_ROUNDS) {
      isFinished = true;
      await generateSummary();
      setInputEnabled(false);
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('userInput').placeholder = '探究已完成，可以重新开始～';
      document.getElementById('restartBtn').style.display = 'block';
    } else {
      setInputEnabled(true);
    }
  } catch (err) {
    removeThinking(thinking);
    appendAIMessage(`⚠️ 出错了：${err.message}，请稍后重试。`);
    round--; updateProgress();
    setInputEnabled(true);
  }
  isSending = false;
}

// ══════════════════════════════════════════════════════
//  SUMMARY
// ══════════════════════════════════════════════════════
async function generateSummary() {
  const thinking = showThinking();
  try {
    let raw = await callAI(SUMMARY_SYSTEM, [
      ...history,
      { role: 'user', content: SUMMARY_PROMPT }
    ], 1200);
    removeThinking(thinking);
    raw = raw.replace(/```json|```/g, '').trim();
    renderSummary(JSON.parse(raw));
  } catch (err) {
    removeThinking(thinking);
    appendAIMessage('总结生成遇到问题，但探究已完成！请向老师展示你们的对话内容。');
  }
}

function renderSummary(data) {
  const wrap = document.getElementById('chatMessages');
  const card = document.createElement('div');
  card.className = 'msg ai';
  card.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <div class="msg-name">学习总结</div>
      <div class="summary-card">
        <div class="summary-title">探究总结</div>
        <p style="font-size:14px;color:#555;line-height:1.8;margin-bottom:14px;">${data.highlights || ''}</p>
        <div class="summary-title" style="margin-top:4px;">线性表的典型应用场景</div>
        <div class="app-list">
          ${(data.applications || []).map(a => `
            <div class="app-item">
              <span class="app-tag">${a.tag}</span>
              <div class="app-desc">
                <strong>${a.name}</strong>（${a.structure}）<br>
                <span style="color:#666;font-size:13px;">${a.reason}</span>
                ${a.future_note ? `<div class="future-note">📖 ${a.future_note}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  wrap.appendChild(card);
  wrap.scrollTop = wrap.scrollHeight;
}

// ══════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════
function appendAIMessage(text) {
  const wrap = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'msg ai';
  const html = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .split('\n\n').map(p => `<p>${p}</p>`).join('');
  el.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <div class="msg-name">AI 学习助手</div>
      <div class="msg-bubble">${html}</div>
    </div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function appendUserMessage(text) {
  const wrap = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `
    <div class="msg-avatar">我</div>
    <div class="msg-body">
      <div class="msg-name">你</div>
      <div class="msg-bubble">${text}</div>
    </div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function showThinking() {
  const wrap = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'thinking';
  el.innerHTML = `
    <div style="width:34px;height:34px;border-radius:50%;background:#1a1a2e;color:#e8a838;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0;">AI</div>
    <div class="thinking-dots"><span></span><span></span><span></span></div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
  return el;
}

function removeThinking(el) { el?.parentNode?.removeChild(el); }

function setInputEnabled(on) {
  document.getElementById('userInput').disabled = !on;
  document.getElementById('sendBtn').disabled = !on;
}

function updateProgress() {
  const pct = Math.min((round / MAX_ROUNDS) * 100, 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('roundCounter').textContent = `${Math.min(round, MAX_ROUNDS)} / ${MAX_ROUNDS} 轮`;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function useHint(chip) {
  const inp = document.getElementById('userInput');
  inp.value = chip.textContent; inp.focus(); autoResize(inp);
}

function restart() {
  history = []; round = 0; isFinished = false; isSending = false;
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('roundCounter').textContent = '0 / 10 轮';
  document.getElementById('hintArea').style.display = 'flex';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('userInput').placeholder = '输入你的想法或问题……';
  if (apiKey && selectedModelId) enableChat();
  showOpening();
}

function showOpening() {
  appendAIMessage(`你好！👋 我们来聊聊线性表在实际软件中的应用。\n\n先热个身：**你平时用的哪些 App 或软件**，让你感觉"它在记录一系列有顺序的东西"？\n\n不用想得太复杂，说说你第一个浮现的例子就好。`);
}

window.onload = () => {
  loadSettings();
  updateModelLabel();
  showOpening();
  if (apiKey && selectedModelId) {
    enableChat();
  } else {
    document.getElementById('userInput').disabled = true;
    document.getElementById('userInput').placeholder = '请先点击右上角「模型设置」配置 API Key';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('noKeyBanner').style.display = 'block';
    setTimeout(openSettings, 450);
  }
};
